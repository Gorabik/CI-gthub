name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          
      - name: Install dependencies
        run: pip install -r crs/tests/requirements.txt
        
      - name: Type checking with mypy
        run: mypy crs/ --ignore-missing-imports
        
      - name: Lint with black
        run: black crs/
        
      - name: Check import sorting with isort
        run: isort crs/ --max-line-length=88 --extend-ignore=E203,W503,B008
        
      - name: Lint with flake8
        run: flake8 crs/
        
